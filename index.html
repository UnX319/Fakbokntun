<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAKBOKNTUN — Safe Space</title>
    
    <!-- Google Fonts: Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: {
                        brand: {
                            purple: '#9333EA',    // สีม่วงปุ่ม
                            dark: '#1E1B4B',      // สีน้ำเงินเข้มตัวหนังสือ
                            light: '#F3E8FF'      // สีม่วงอ่อน
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-gray-800 font-sans min-h-screen overflow-x-hidden relative">

    <!-- พื้นหลังลายตาราง (Grid) -->
    <div class="fixed inset-0 z-[-2] bg-grid opacity-40 pointer-events-none"></div>

    <!-- พื้นหลังคลื่นสีม่วง (Wave) -->
    <div class="fixed bottom-0 left-0 right-0 z-[-1] pointer-events-none">
        <svg viewBox="0 0 1440 320" class="w-full h-auto min-h-[30vh] object-cover" preserveAspectRatio="none">
            <path fill="#9333EA" fill-opacity="0.1" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,224C960,245,1056,235,1152,202.7C1248,171,1344,117,1392,90.7L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
            <path fill="#9333EA" fill-opacity="0.8" d="M0,224L48,229.3C96,235,192,245,288,224C384,203,480,149,576,138.7C672,128,768,160,864,181.3C960,203,1056,213,1152,197.3C1248,181,1344,139,1392,117.3L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>

    <!-- Navbar สไตล์เรฟเฟอเรนซ์ -->
    <nav class="w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center relative z-50">
        <div class="text-2xl font-bold text-brand-dark tracking-tight">Fakbokntun</div>
        
        <!-- เมนูตรงกลาง (ซ่อนในมือถือ) -->
        <div class="hidden md:flex gap-8 text-brand-dark/70 font-medium">
            <a href="#" class="hover:text-brand-purple transition-colors">หน้าหลัก</a>
            <a href="#" class="hover:text-brand-purple transition-colors">บริการ</a>
            <a href="#" class="hover:text-brand-purple transition-colors">เกี่ยวกับ</a>
        </div>

        <div id="nav-actions">
            <!-- ปุ่มล็อกอิน จะถูกจัดการโดย JS -->
            <button id="btn-login-nav" class="bg-brand-purple hover:bg-purple-700 text-white px-8 py-2.5 rounded-full font-medium transition-all shadow-lg shadow-purple-500/30">
                เข้าสู่ระบบ
            </button>
        </div>
    </nav>

    <main class="relative z-10 w-full max-w-7xl mx-auto px-6 pt-10 pb-24">
        
        <!-- VIEW: LANDING (หน้าแรก) -->
        <section id="view-landing" class="view-section flex flex-col md:flex-row items-center justify-between gap-12 mt-10">
            <div class="flex-1 text-left animate-fade-in-up">
                <h1 class="text-5xl md:text-7xl font-bold text-brand-dark leading-[1.1] mb-6 tracking-tight">
                    พลังจาก<br>คำแนะนำชั้นเยี่ยม
                </h1>
                <p class="text-lg text-gray-600 mb-8 max-w-lg">
                    พื้นที่ปลอดภัยสำหรับส่งต่อความรู้สึกที่ซ่อนไว้ คลิกที่นี่เพื่อเพิ่มข้อความของคุณและส่งต่อให้ถึงคนๆ นั้น
                </p>
                <button id="btn-login-hero" class="bg-brand-purple hover:bg-purple-700 text-white px-10 py-4 rounded-full font-medium text-lg transition-all shadow-xl shadow-purple-500/30 hover:-translate-y-1">
                    เริ่มต้นใช้งาน
                </button>
            </div>
            <div class="flex-1 hidden md:block">
                <!-- เว้นที่ว่างไว้ให้คลื่นโชว์สวยๆ -->
            </div>
        </section>

        <!-- VIEW: USER PORTAL (หน้าส่งข้อความ) -->
        <section id="view-user" class="view-section hidden flex-col gap-10 mt-10 animate-fade-in-up">
            <div class="w-full max-w-3xl mx-auto bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-2xl shadow-brand-purple/10 border border-purple-100">
                <h2 class="text-2xl font-bold text-brand-dark mb-4">ส่งข้อความของคุณ</h2>
                <textarea id="message-input" rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-2xl p-6 text-xl text-brand-dark resize-none focus:outline-none focus:border-brand-purple focus:ring-2 focus:ring-purple-100 transition-all" placeholder="พิมพ์ความในใจของคุณที่นี่..."></textarea>
                
                <div class="flex flex-col md:flex-row justify-between items-center gap-6 mt-6">
                    <label class="flex items-center cursor-pointer gap-3">
                        <div class="relative">
                            <input type="checkbox" id="anon-toggle" class="sr-only" checked>
                            <div class="toggle-track block bg-gray-300 w-12 h-6 rounded-full transition-colors"></div>
                            <div class="toggle-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                        </div>
                        <span class="text-sm font-medium text-gray-600">ส่งแบบไม่ระบุตัวตน</span>
                    </label>
                    <button id="btn-submit" class="w-full md:w-auto bg-brand-dark hover:bg-black text-white px-10 py-3 rounded-full font-medium transition-all shadow-lg">
                        ส่งข้อความ
                    </button>
                </div>
            </div>

            <div class="w-full max-w-5xl mx-auto mt-8">
                <h3 class="text-xl font-bold text-brand-dark mb-6 border-b border-gray-200 pb-2">ประวัติการส่งของคุณ</h3>
                <div id="user-history" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <!-- VIEW: ADMIN DASHBOARD (หน้าแอดมิน) -->
        <section id="view-admin" class="view-section hidden flex-col gap-8 mt-10 animate-fade-in-up">
            <div class="flex justify-between items-center bg-white/90 p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-brand-dark">ระบบจัดการข้อความ</h2>
                <button id="btn-refresh" class="text-sm bg-gray-100 px-6 py-2 rounded-full hover:bg-gray-200 transition-colors font-medium">รีเฟรชข้อมูล</button>
            </div>
            <div id="admin-pending" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[9999] pointer-events-none opacity-0 transition-all duration-300 transform translate-y-4">
        <div class="bg-brand-dark text-white px-8 py-4 rounded-full text-sm font-medium shadow-2xl flex items-center gap-3">
            <span class="w-2 h-2 rounded-full bg-brand-purple animate-pulse"></span>
            <span id="toast-msg">แจ้งเตือน</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
