<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAKBOKNTUN — The Safe Space</title>
    
    <!-- Premium Fonts: Playfair Display (Serif/Headers) & Plus Jakarta Sans (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#FAF8F5',  // Background หลัก
                            100: '#F0EBE1', // สีพื้นหลังรอง (Card)
                            200: '#E2D9C8', // Borders
                            800: '#4A3F35', // Text หลัก
                            900: '#2C241E'  // Headings
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', '"IBM Plex Sans Thai"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif']
                    }
                }
            }
        }
    </script>

    <!-- GSAP & Supabase -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-warm-50 text-warm-800 font-sans antialiased min-h-screen overflow-x-hidden selection:bg-warm-200 selection:text-warm-900">

    <!-- Premium CSS Loader -->
    <div id="app-loader" class="fixed inset-0 z-[10000] bg-warm-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="loader-circle mb-6"></div>
        <p class="text-xs tracking-[0.2em] uppercase font-medium text-warm-800/60">Curating Space</p>
    </div>

    <!-- React-style Floating Sidebar/Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-4 md:p-6 pointer-events-none">
        <div class="max-w-6xl mx-auto flex justify-between items-center bg-white/70 backdrop-blur-xl border border-warm-200/50 rounded-full px-6 py-3 shadow-[0_8px_30px_rgb(0,0,0,0.04)] pointer-events-auto nav-reveal">
            <div class="font-serif font-semibold text-lg tracking-wide text-warm-900">
                Fakbokntun<span class="text-amber-600">.</span>
            </div>
            
            <div id="user-nav-info" class="hidden flex items-center gap-4">
                <span id="nav-email" class="text-xs font-medium text-warm-800/70 hidden md:block"></span>
                <button class="btn-logout text-xs font-semibold bg-warm-100 hover:bg-warm-200 text-warm-900 px-4 py-2 rounded-full transition-colors">Sign Out</button>
            </div>
        </div>
    </nav>

    <main class="relative z-10 w-full min-h-screen pt-32 pb-20 px-6 md:px-12 flex flex-col items-center">
        
        <!-- VIEW: LANDING -->
        <section id="view-landing" class="view-section hidden w-full max-w-4xl flex-col items-center text-center mt-10 md:mt-20">
            <span class="text-xs font-bold tracking-[0.2em] uppercase text-amber-700 mb-6 gs-reveal">A Safe Haven</span>
            <h1 class="text-5xl md:text-7xl font-serif text-warm-900 leading-tight mb-8 gs-reveal">
                Unspoken words, <br> <span class="italic text-warm-800/80">beautifully</span> delivered.
            </h1>
            <p class="text-sm md:text-base text-warm-800/60 max-w-lg mb-12 font-light leading-relaxed gs-reveal">
                พื้นที่ปลอดภัยสำหรับส่งต่อความรู้สึกที่ซ่อนไว้ <br class="hidden md:block">
                ทุกข้อความจะถูกดูแลอย่างดีในโทนสีที่อบอุ่นที่สุด
            </p>
            
            <button id="btn-login" class="gs-reveal bg-warm-900 text-warm-50 hover:bg-warm-800 hover:scale-105 transition-all duration-300 py-4 px-10 rounded-full flex items-center gap-3 shadow-xl shadow-warm-900/20">
                <span class="text-sm font-semibold tracking-wider">Continue with Google</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </section>

        <!-- VIEW: USER PORTAL -->
        <section id="view-user" class="view-section hidden w-full max-w-4xl flex-col gap-16 mt-8">
            
            <!-- Composer Form (React-style component) -->
            <div class="w-full bg-white rounded-[2rem] p-8 md:p-12 shadow-[0_20px_50px_rgba(0,0,0,0.03)] border border-warm-100 gs-reveal">
                <h2 class="text-2xl font-serif text-warm-900 mb-6">Write your truth.</h2>
                
                <textarea id="message-input" rows="1" class="w-full bg-transparent p-0 text-xl md:text-2xl text-warm-900 resize-none focus:outline-none placeholder:text-warm-200 min-h-[100px] font-light leading-relaxed" placeholder="มีความในใจอะไร อยากบอกใคร..."></textarea>

                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mt-8 pt-8 border-t border-warm-100">
                    <div class="flex items-center gap-4">
                        <!-- CSS Banter Toggle -->
                        <label class="toggle-container flex items-center cursor-pointer gap-3 group">
                            <div class="relative">
                                <input type="checkbox" id="anon-toggle" class="sr-only" checked>
                                <div class="toggle-track block bg-warm-200 w-12 h-6 rounded-full transition-colors"></div>
                                <div class="toggle-dot dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                            </div>
                            <span class="text-xs font-semibold tracking-wider uppercase text-warm-800/50 group-hover:text-warm-800 transition-colors">Anonymous</span>
                        </label>
                    </div>

                    <button id="btn-submit" class="w-full md:w-auto bg-amber-700 text-white py-3.5 px-10 rounded-full hover:bg-amber-800 hover:shadow-lg hover:shadow-amber-900/20 transition-all duration-300 text-xs font-semibold tracking-widest uppercase disabled:opacity-50">
                        Release Message
                    </button>
                </div>
            </div>

            <!-- History Feed (Grid Layout instead of single box) -->
            <div class="w-full gs-reveal">
                <div class="flex justify-between items-end mb-8 border-b border-warm-200 pb-4">
                    <h3 class="text-sm font-semibold uppercase tracking-widest text-warm-900">Your Journey</h3>
                    <span class="text-xs text-warm-800/50">Recent</span>
                </div>
                
                <div id="user-history" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </section>

        <!-- VIEW: ADMIN DASHBOARD -->
        <section id="view-admin" class="view-section hidden w-full max-w-5xl flex-col gap-12 mt-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 gs-reveal">
                <div>
                    <h2 class="text-3xl font-serif text-warm-900 mb-2">Curator Board</h2>
                    <p class="text-sm text-warm-800/60 font-medium">Managing submissions</p>
                </div>
                <button id="btn-refresh" class="text-xs bg-white border border-warm-200 px-5 py-2.5 rounded-full hover:bg-warm-100 transition-colors font-semibold tracking-wide shadow-sm">Sync Entries</button>
            </div>

            <div id="admin-pending" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 gs-reveal">
                <!-- Admin Cards -->
            </div>
        </section>

    </main>

    <!-- Refined Toast Feedback -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[9999] pointer-events-none opacity-0 flex items-center justify-center">
        <div class="bg-warm-900 text-white px-8 py-4 rounded-2xl text-xs tracking-wider font-semibold shadow-2xl flex items-center gap-3">
            <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
            <span id="toast-msg"></span>
        </div>
    </div>

    <!-- Global Footer -->
    <footer class="w-full border-t border-warm-200/60 py-8 text-center text-xs font-medium tracking-wide text-warm-800/40">
        © 2026 Fakbokntun. Crafted with warmth.
    </footer>

    <script src="script.js"></script>
</body>
</html>
